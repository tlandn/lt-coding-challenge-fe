name: Deploy problem2-fancy-form to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/problem2-fancy-form/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/problem2-fancy-form
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: src/problem2-fancy-form/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/problem2-fancy-form/dist
